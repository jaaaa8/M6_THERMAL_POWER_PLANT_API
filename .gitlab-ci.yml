# ================================================================
#  GitLab CI/CD — Backend: Spring Boot 3.5.1 + Java 17 + Gradle
#  Deploy: AWS ECR → ECS Fargate
# ================================================================
#
# Biến môi trường cần cấu hình trong GitLab:
# Settings → CI/CD → Variables
#   AWS_ACCESS_KEY_ID      (masked)
#   AWS_SECRET_ACCESS_KEY  (masked)
#   AWS_ACCOUNT_ID         (ví dụ: 123456789012)
#   DB_URL                 (masked) → jdbc:mysql://rds-endpoint:3306/m6_thermal_power_plant
#   DB_USERNAME            (masked)
#   DB_PASSWORD            (masked)
#   JWT_SECRET             (masked)
#   MAIL_USERNAME          (masked)
#   MAIL_PASSWORD          (masked)
# ================================================================

stages:
  - test
  - build
  - docker
  - deploy

# ── Biến dùng chung ────────────────────────────────────────────
variables:
  AWS_REGION: "ap-northeast-1"                                     # Tokyo
  ECR_REGISTRY: "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
  IMAGE_NAME: "thermal-power-plant-api"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"                              # Tag theo commit hash (dễ rollback)
  ECS_CLUSTER: "thermal-power-plant-cluster"
  ECS_SERVICE: "thermal-power-plant-api-service"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

# ── Cache Gradle dependencies giữa các job ─────────────────────
.gradle-cache: &gradle-cache
  cache:
    key:
      files:
        - build.gradle
        - gradle/wrapper/gradle-wrapper.properties
    paths:
      - .gradle/
    policy: pull-push

# ══════════════════════════════════════════════════════════════
# STAGE 1: TEST
# ══════════════════════════════════════════════════════════════
unit-test:
  stage: test
  image: gradle:8.14.3-jdk17-alpine
  <<: *gradle-cache
  script:
    - ./gradlew test --no-daemon
  artifacts:
    name: "test-results-${CI_COMMIT_SHORT_SHA}"
    when: always                      # Lưu kể cả khi test fail
    reports:
      junit: build/test-results/test/*.xml
    paths:
      - build/reports/tests/
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'   # Chạy khi có MR
    - if: '$CI_COMMIT_BRANCH == "main"'                    # Chạy khi push lên main
    - if: '$CI_COMMIT_BRANCH == "develop"'                 # Chạy khi push lên develop

# ══════════════════════════════════════════════════════════════
# STAGE 2: BUILD JAR
# ══════════════════════════════════════════════════════════════
build-jar:
  stage: build
  image: gradle:8.14.3-jdk17-alpine
  <<: *gradle-cache
  script:
    - ./gradlew bootJar -x test --no-daemon
    - echo "JAR built successfully:"
    - ls -lh build/libs/
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ══════════════════════════════════════════════════════════════
# STAGE 3: DOCKER BUILD & PUSH TO AWS ECR
# ══════════════════════════════════════════════════════════════
docker-build-push:
  stage: docker
  image: docker:27-cli
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Cài AWS CLI trong Docker image
    - apk add --no-cache aws-cli
    # Login vào ECR
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
    # Tạo ECR repository nếu chưa có
    - aws ecr describe-repositories --repository-names $IMAGE_NAME --region $AWS_REGION 2>/dev/null
        || aws ecr create-repository --repository-name $IMAGE_NAME --region $AWS_REGION
  script:
    # Build image (dùng BuildKit để nhanh hơn)
    - export DOCKER_BUILDKIT=1
    - docker build --tag $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG --tag $ECR_REGISTRY/$IMAGE_NAME:latest .
    # Push cả 2 tag: commit hash + latest
    - docker push $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
    - docker push $ECR_REGISTRY/$IMAGE_NAME:latest
    - echo "Image pushed → $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ══════════════════════════════════════════════════════════════
# STAGE 4: DEPLOY LÊN ECS FARGATE
# ══════════════════════════════════════════════════════════════
deploy-production:
  stage: deploy
  image: amazon/aws-cli:latest
  script:
    # Cập nhật ECS Service để pull image mới nhất
    - |
      aws ecs update-service \
        --cluster $ECS_CLUSTER \
        --service $ECS_SERVICE \
        --force-new-deployment \
        --region $AWS_REGION
    # Chờ deployment hoàn thành (tối đa 10 phút)
    - |
      aws ecs wait services-stable \
        --cluster $ECS_CLUSTER \
        --services $ECS_SERVICE \
        --region $AWS_REGION
    - echo "✅ Deployment successful!"
  environment:
    name: production
    url: https://api.your-domain.com    # Thay bằng domain thực của bạn
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  when: on_success
