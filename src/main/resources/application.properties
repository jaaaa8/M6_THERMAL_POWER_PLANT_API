spring.application.name=M6_THERMAL_POWER_PLANT_API
spring.profiles.active=dev

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/m6_thermal_power_plant?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=codegym
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
# ddl-auto=validate: Flyway giờ SỞ HỮU schema (db/migration/*.sql). Hibernate chỉ
# đối chiếu entity <-> schema hiện có khi khởi động, KHÔNG tự sửa DB nữa — sửa
# schema phải qua migration mới (Vx__mo_ta.sql), không sửa tay/đổi entity suông.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# FLYWAY
# Migrations o src/main/resources/db/migration (mac dinh, khong can khai bao location).
# baseline-on-migrate: chi co tac dung khi schema DA CO SAN du lieu/bang nhung
# CHUA co bang flyway_schema_history (vd: dong nghiep khac dang dung ddl-auto=update
# cu, chua tung chay Flyway) -> Flyway "chap nhan" schema hien tai lam moc thay vi bao loi.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

