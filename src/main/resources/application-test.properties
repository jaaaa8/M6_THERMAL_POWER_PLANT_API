# ================================================================
#  Test Profile — Dùng H2 in-memory DB thay MySQL
#  Áp dụng khi chạy: ./gradlew test -Dspring.profiles.active=test
#  Trong CI/CD (Jenkins/GitLab) sẽ dùng profile này
# ================================================================

# H2 in-memory database (thay thế MySQL khi test)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate — H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway migrations (db/migration/*.sql) dùng cú pháp riêng của MySQL 8 (STORED
# generated column, SET FOREIGN_KEY_CHECKS...) — KHÔNG chạy được trên H2. Test
# vẫn dùng Hibernate ddl-auto=create-drop ở trên để tự sinh schema trên H2.
spring.flyway.enabled=false

# H2 Console (debug local)
spring.h2.console.enabled=false

# Mail trỏ host giả để không gửi thật khi test. KHÔNG exclude
# MailSenderAutoConfiguration — AccountService cần bean JavaMailSender trong
# constructor; exclude sẽ làm context fail ngay lúc boot.
spring.mail.host=localhost
spring.mail.port=25
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# H2 2.x coi VALUE là từ khoá — cột equipment_parameters.value làm ddl-auto fail.
# Quote toàn bộ identifier khi sinh DDL để tránh đụng từ khoá.
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# JWT — dùng key giả cho test
jwt.secret=dGVzdFNlY3JldEtleUZvckNJQ0RUZXN0aW5nT25seU5vdEZvclByb2Q=
jwt.expiration=3600000
