spring.application.name=M6_THERMAL_POWER_PLANT_API

# ─── DATABASE ─────────────────────────────────────────────────
# Được inject từ biến môi trường (Docker / Jenkins Credentials)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / HIBERNATE ──────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# validate: schema trên AWS RDS do Flyway (db/migration/*.sql) quản lý, KHÔNG
# để Hibernate tự sửa DB production nữa.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── FLYWAY ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ─── CLOUDINARY ───────────────────────────────────────────────
# Inject từ biến môi trường (Docker / Jenkins Credentials) — KHÔNG hardcode
# secret trong file commit lên repo, giống DB_PASSWORD/JWT_SECRET ở trên.
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Upload multipart (ảnh/PDF) — trần kích thước request
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ─── JWT ──────────────────────────────────────────────────────
scms.jwt.base64-secret=${JWT_SECRET}
scms.jwt.access-token-expiration=900000
scms.jwt.refresh-token-expiration=604800000

# ─── MAIL (SMTP) ──────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── ACTUATOR / HEALTH ────────────────────────────────────────
# Loại mail indicator khỏi /actuator/health. ALB health check chỉ nên phụ thuộc
# tình trạng app + DB, KHÔNG phụ thuộc kết nối SMTP Gmail (mail là tính năng phụ,
# gửi async). Mail indicator DOWN (SMTP auth fail vì Gmail cần App Password) từng
# khiến /actuator/health trả 503 → ALB đánh task unhealthy → crash loop.
management.health.mail.enabled=false

# ─── SERVER ───────────────────────────────────────────────────
server.port=8080
# Tắt error details để không lộ thông tin nội bộ
server.error.include-stacktrace=never
server.error.include-message=never
